name: CI macOS

# Gate macOS speculare a ci.yml (ubuntu). Runner macos-latest = Apple Silicon (arm64),
# l'hardware di riferimento per VOKARI su Mac (faster-whisper usa l'Accelerate Framework).
# Stessa struttura: motore Python (uv) + frontend (pnpm). I benchmark/modelli non girano qui.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # ffmpeg = conversione audio; portaudio = build/uso di sounddevice (mic, cross-platform).
      # PyAudioWPatch (loopback) è win-only via env marker → non installato qui (mic-only su macOS).
      - run: brew install ffmpeg portaudio
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run pytest --cov -q   # coverage gate: fail_under in pyproject.toml

  frontend:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc -b
      - run: pnpm run lint        # eslint: 0 errori richiesti (i warning non bloccano)
      - run: pnpm run test:cov    # vitest + soglie coverage in vitest.config.ts
      - run: pnpm build
